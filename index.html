<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>하준이의 성장 앨범</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap');

        html { scroll-behavior: smooth; }

        :root { color-scheme: light; --bg-color: #ffffff; --text-color: #333333; --point-color: #92b4d2; --entry-bg: #f4f7fb; }
        * { box-sizing: border-box; }
        body { background-color: var(--bg-color); font-family: 'Noto Sans KR', sans-serif; margin: 0; padding: 0; color: var(--text-color); padding-top: 70px; }

        #dynamic-top-bar {
            position: fixed; top: 0; left: 0; width: 100%; height: 55px; 
            background: rgba(146, 180, 210, 0.95); backdrop-filter: blur(10px); 
            border-bottom: 2px solid #7ea6ca; z-index: 3000;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.15rem; font-weight: 900; color: #ffffff; letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* 🚀 화면 오른쪽 끝으로 바짝 붙임 (right: 15px) */
        #smart-nav { position: fixed; bottom: 25px; right: 15px; z-index: 1000; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        a { text-decoration: none; -webkit-tap-highlight-color: transparent; }
        #btn-top { width: 35px; height: 35px; border-radius: 50%; background: #f1f2f6; color: #7f8c8d; border: 1px solid #dfe4ea; font-size: 10px; font-weight: 900; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        #nav-toggle { width: 58px; height: 58px; border-radius: 50%; background: var(--point-color); color: white; border: none; cursor: pointer; box-shadow: 0 6px 20px rgba(146, 180, 210, 0.4); display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #nav-toggle .icon { font-size: 22px; line-height: 1; }
        #nav-toggle .label { font-size: 9px; font-weight: 700; margin-top: 2px; letter-spacing: -0.5px; }
        
        #nav-container { 
            background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(15px); 
            padding: 15px 8px; border-radius: 20px; border: 2.5px solid var(--point-color); 
            box-shadow: 0 15px 50px rgba(0,0,0,0.2); width: 60px; max-height: 60vh; 
            overflow-y: auto; text-align: center; margin-bottom: 5px; 
            opacity: 0; visibility: hidden; transform: translateY(10px); transition: all 0.3s ease; 
        }
        #nav-container.show { opacity: 1; visibility: visible; transform: translateY(0); }
        #nav-container::-webkit-scrollbar { width: 0; }
        
        .nav-year { font-family: 'Montserrat', sans-serif; font-weight: 900; color: #2c3e50; font-size: 0.75rem; margin: 10px 0 6px; border-bottom: 2px solid var(--point-color); padding-bottom: 3px; }
        .nav-month-grid { display: flex; flex-direction: column; gap: 8px; align-items: center; }
        .nav-month { width: 42px; height: 32px; line-height: 30px; font-size: 0.8rem; font-weight: 700; color: #333; cursor: pointer; text-align: center; border-radius: 10px; background: #fff; border: 1.5px solid #eee; display: block; margin: 0 auto; }

        .credit-header { width: 100%; max-width: 800px; margin: 20px auto 10px; text-align: center; padding: 0 20px; }
        .credit-title { font-family: 'Montserrat', sans-serif; font-size: 0.85rem; color: #ced6e0; letter-spacing: 4px; margin-bottom: 15px; font-weight: 700; }
        .credit-badge { display: inline-block; background: #fff; padding: 12px 25px; border-radius: 40px; border: 1px solid #f1f2f6; font-size: 0.85rem; color: #7f8c8d; box-shadow: 0 4px 15px rgba(0,0,0,0.03); }

        .book-container { width: 100%; max-width: 850px; margin: 0 auto 50px auto; padding: 0 10px; }
        
        .month-header { background: #fdfdfd; color: var(--point-color); padding: 8px 25px; border-radius: 20px; border: 2px solid var(--point-color); font-size: 1.1rem; font-weight: 900; margin: 30px auto 20px auto; display: inline-block; scroll-margin-top: 80px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .month-header-wrapper { text-align: center; width: 100%; }

        .entry { display: flex; flex-direction: row; gap: 15px; margin-bottom: 40px; align-items: flex-start; }
        .entry-left { flex: 0 0 65px; display: flex; flex-direction: column; align-items: center; gap: 2px; position: sticky; top: 70px; z-index: 10; pointer-events: none; }
        .date-num { font-family: 'Montserrat', sans-serif; font-size: 2.2rem; font-weight: 900; color: #2f3640; line-height: 1; }
        .date-day { font-size: 0.8rem; color: #7f8c8d; font-weight: 700; white-space: nowrap; }
        .weather-icon { font-size: 1.4rem; margin-top: 4px; }
        
        .entry-right { flex: 1; min-width: 0; }
        .entry-header { margin-bottom: 10px; }
        .photo-gallery { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin: 10px 0 15px 0; }
        .photo-gallery img { width: 100%; aspect-ratio: 1 / 1; object-fit: cover; border-radius: 6px; cursor: pointer; position: relative; z-index: 20; pointer-events: auto; }
        .entry-content { background: var(--entry-bg); padding: 18px; border-radius: 15px; font-size: 0.95rem; line-height: 1.7; white-space: pre-wrap; word-break: break-all; color: #444; }

        #lightbox { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 4000; display: none; align-items: center; justify-content: center; }
        #lightbox.active { display: flex; }
        #lightbox-img { max-width: 95%; max-height: 90%; object-fit: contain; pointer-events: auto; }

        @media (min-width: 768px) {
            .book-container { padding: 0 20px; }
            .entry { gap: 40px; margin-bottom: 60px; }
            .entry-left { flex: 0 0 90px; top: 80px; }
            .date-num { font-size: 3.5rem; }
            /* 🚀 PC 화면에서도 오른쪽으로 바짝 붙임 (right: 30px) */
            #smart-nav { bottom: 40px; right: 30px; }
        }
    </style>
</head>
<body>

<div id="dynamic-top-bar">📅 HAJUN'S MEMORY BOOK</div>
<div id="top-anchor"></div>

<div id="smart-nav">
    <div id="nav-container"><div id="nav-items"></div></div>
    <a id="btn-top" href="#top-anchor" onclick="closeNavDelayed()">TOP</a>
    <button id="nav-toggle" onclick="toggleNav()"><span class="icon">📅</span><span class="label">TIME SLICE</span></button>
</div>

<div class="credit-header">
    <div class="credit-title">HAJUN'S MEMORY BOOK</div>
    <div class="credit-badge">Created by <b>두인호</b> x <b>Gemini</b> | <span id="info-tag" style="color:#e74c3c; font-weight:900;"></span></div>
</div>

<div id="album-content" class="book-container"></div>
<div id="lightbox" onclick="this.classList.remove('active')"><img id="lightbox-img" src=""></div>

<script src="./reports.js"></script>
<script src="./albums.js"></script>

<script>
    const lastMod = new Date(document.lastModified);
    const dateStr = `${lastMod.getFullYear()}.${String(lastMod.getMonth() + 1).padStart(2, '0')}.${String(lastMod.getDate()).padStart(2, '0')}`;
    document.getElementById('info-tag').innerText = `v25 (Right Nav) | ${dateStr}`;

    function toggleNav() {
        document.getElementById('nav-container').classList.toggle('show');
    }

    function closeNavDelayed() {
        setTimeout(() => {
            document.getElementById('nav-container').classList.remove('show');
        }, 300); 
    }

    const weatherMap = { 'sunny': '☀️', 'mostly_cloudy': '⛅', 'partly_cloudy': '🌤️', 'overcast': '☁️', 'rain': '🌧️', 'snow': '❄️' };
    const weekDays = ['일', '월', '화', '수', '목', '금', '토'];

    function openLightbox(src) {
        document.getElementById('lightbox-img').src = src;
        document.getElementById('lightbox').classList.add('active');
    }

    function render() {
        const container = document.getElementById('album-content');
        const nav = document.getElementById('nav-items');
        if (typeof reportsData === 'undefined') return;

        const data = {};
        reportsData.forEach(r => {
            const d = new Date(r.date_written);
            const s = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
            if(!data[s]) data[s] = { date: d, reports: [], albums: [], weather: r.weather };
            data[s].reports.push(r);
        });

        if (typeof albumsData !== 'undefined') {
            albumsData.forEach(a => {
                const d = new Date(a.date_written);
                const s = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
                if(!data[s]) data[s] = { date: d, reports: [], albums: [], weather: 'sunny' };
                data[s].albums.push(a);
            });
        }

        const sorted = Object.keys(data).sort((a,b) => new Date(a) - new Date(b));
        let lastYear = '', lastYM = '';

        sorted.forEach(dateStr => {
            const day = data[dateStr];
            const year = day.date.getFullYear();
            const month = day.date.getMonth()+1;
            const YM = `${year}년 ${month}월`;
            const mId = `m-${year}-${month}`;

            if(lastYM !== YM) {
                lastYM = YM;
                if(lastYear !== year) {
                    lastYear = year;
                    const yrDiv = document.createElement('div'); yrDiv.className = 'nav-year'; yrDiv.textContent = year; nav.appendChild(yrDiv);
                }
                
                const hWrap = document.createElement('div'); hWrap.className = 'month-header-wrapper';
                const h = document.createElement('div'); h.className = 'month-header'; h.id = mId; h.textContent = YM; 
                hWrap.appendChild(h);
                container.appendChild(hWrap);
                
                const a = document.createElement('a');
                a.className = 'nav-month';
                a.href = `#${mId}`; 
                a.textContent = month + "월";
                a.onclick = () => closeNavDelayed();
                nav.appendChild(a);
            }

            const div = document.createElement('div'); div.className = 'entry';
            div.setAttribute('data-ym', YM);

            let rightHtml = '';
            let authorName = (day.reports.length > 0) ? day.reports[0].author_name : "선생님";
            rightHtml += `<div class="entry-header"><div style="font-size:1rem;color:#2c3e50;font-weight:700;">원에서 가정으로</div><div style="font-size:0.75rem;color:#a4b0be;">${authorName}</div></div>`;

            let allImages = [];
            day.reports.forEach(r => { if(r.local_images) allImages = allImages.concat(r.local_images.map(img => `./images/${img.split(/[\\\/]/).pop()}`)); });
            
            day.albums.forEach(a => { if(a.local_images) {
                const filtered = a.local_images.filter(img => {
                    if (img.includes('145416371')) {
                        return img.includes('img_76.jpg') || img.includes('img_77.jpg');
                    }
                    return true;
                });
                allImages = allImages.concat(filtered.map(img => `./album_images/${img.split(/[\\\/]/).pop()}`));
            }});

            if(allImages.length > 0) {
                rightHtml += `<div class="photo-gallery">`;
                allImages.forEach(src => { rightHtml += `<img src="${src}" onclick="openLightbox('${src}')" onerror="this.remove()">`; });
                rightHtml += `</div>`;
            }

            let allContent = day.reports.map(r => r.content).join('\n\n');
            if(allContent.trim() !== '') { rightHtml += `<div class="entry-content">${allContent}</div>`; }
            
            div.innerHTML = `
                <div class="entry-left">
                    <div class="date-num">${day.date.getDate()}</div>
                    <div class="date-day">${weekDays[day.date.getDay()]}요일</div>
                    <div class="weather-icon">${weatherMap[day.weather]||'☀️'}</div>
                </div>
                <div class="entry-right">${rightHtml}</div>
            `;
            container.appendChild(div);
        });

        window.addEventListener('scroll', () => {
            let currentMonthText = "HAJUN'S MEMORY BOOK";
            const headers = document.querySelectorAll('.month-header');
            headers.forEach(header => {
                const rect = header.getBoundingClientRect();
                if (rect.top <= 90) {
                    currentMonthText = header.textContent;
                }
            });
            document.getElementById('dynamic-top-bar').textContent = `📅 ${currentMonthText}`;
        });
    }

    window.onload = render;
</script>
</body>
</html>
