<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>하준이의 키즈노트 성장 앨범</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&display=swap');

        /* ⚪ 무조건 화이트 모드 고정 */
        :root {
            color-scheme: light; /* 브라우저 다크모드 무시 */
        }

        body {
            background-color: #ffffff; font-family: 'Noto Sans KR', sans-serif;
            margin: 0; padding: 0; color: #333333; scroll-behavior: smooth;
        }

        /* 🧭 숨김형 퀵 내비게이션 (평소엔 투명, 마우스 올리면 나타남) */
        #quick-nav {
            position: fixed; top: 50%; right: 15px; transform: translateY(-50%);
            width: 60px; background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px); padding: 12px 5px; border-radius: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08); z-index: 1000;
            max-height: 70vh; overflow-y: auto; border: 1px solid #eeeeee;
            opacity: 0.15; /* 평소엔 거의 투명 */
            transition: opacity 0.4s ease, width 0.3s ease; /* 부드러운 전환 */
        }

        /* 마우스를 올리거나 터치하면 선명해짐 */
        #quick-nav:hover, #quick-nav:active {
            opacity: 1;
            width: 85px;
        }

        #quick-nav::-webkit-scrollbar { width: 0px; } /* 스크롤바 숨김 */

        .nav-year { font-weight: 700; color: #2c3e50; margin-top: 12px; font-size: 0.7rem; text-align: center; border-bottom: 2px solid #92b4d2; margin-bottom: 5px; }
        .nav-month-grid { display: flex; flex-direction: column; gap: 5px; }
        .nav-month { font-size: 0.85rem; color: #555555; cursor: pointer; padding: 7px 0; text-align: center; border-radius: 50%; background: #fdfdfd; border: 1px solid #f0f0f0; transition: 0.2s; }
        .nav-month:hover { background: #92b4d2; color: #ffffff; border-color: #92b4d2; }

        /* 👑 상단 서명 */
        .credit-header { width: 100%; max-width: 800px; margin: 30px auto 10px; text-align: center; padding: 0 20px; box-sizing: border-box; }
        .credit-title { font-family: 'Montserrat', sans-serif; font-size: 0.85rem; font-weight: 700; color: #b2bec3; letter-spacing: 3px; margin-bottom: 12px; }
        .credit-badge { display: inline-block; background: #ffffff; padding: 10px 20px; border-radius: 25px; border: 1px solid #f1f2f6; font-size: 0.8rem; color: #7f8c8d; }
        .credit-badge b { color: #2d3436; }

        /* 앨범 메인 컨테이너 */
        .book-container { 
            width: 95%; max-width: 850px; background: #ffffff; 
            margin: 0 auto 50px auto; padding: 10px 20px; 
            box-sizing: border-box;
        }

        .month-header { 
            background-color: #92b4d2; color: #ffffff; padding: 8px 25px; 
            border-radius: 30px; font-size: 1.1rem; font-weight: 700; 
            margin: 50px 0 25px 0; display: inline-block; scroll-margin-top: 30px;
        }

        .entry { display: flex; flex-direction: column; gap: 15px; margin-bottom: 60px; }
        
        .entry-left { display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #f8f9fa; padding-bottom: 12px; }
        .date-num { font-size: 2.4rem; font-weight: 700; color: #333333; }
        .date-day { font-size: 0.95rem; color: #999999; margin-top: 10px; }
        .weather-icon { font-size: 1.6rem; margin-left: auto; }

        .entry-right { width: 100%; }
        .entry-header { margin-bottom: 12px; }
        .entry-title { font-size: 1rem; color: #2c3e50; font-weight: 700; }
        .entry-author { font-size: 0.85rem; color: #b2bec3; }
        
        .entry-content {
            background-color: #fcfdfe; padding: 20px; border-radius: 15px; 
            font-size: 1.05rem; line-height: 1.8; color: #333333; 
            white-space: pre-wrap; word-break: break-all;
            border: 1px solid #f1f4f7;
        }

        .album-section { background-color: #fffcf9; border: 1px solid #f9f1e8; padding: 15px; border-radius: 15px; margin-top: 20px; }
        .album-title { font-size: 0.95rem; font-weight: 700; color: #e67e22; margin-bottom: 12px; }

        .photo-gallery { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(145px, 1fr)); 
            gap: 10px; margin-bottom: 15px; 
        }
        .photo-gallery img {
            width: 100%; height: 190px; object-fit: cover; border-radius: 10px;
            background: #f9f9f9; transition: transform 0.2s ease;
        }
        .photo-gallery img.wide-pic { grid-column: span 2; height: 230px; }

        @media (min-width: 768px) {
            .entry { flex-direction: row; gap: 30px; }
            .entry-left { flex-direction: column; width: 80px; border-bottom: none; padding-bottom: 0; align-items: center; }
            .weather-icon { margin-left: 0; }
            .photo-gallery { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
            #quick-nav { right: 25px; }
        }

        @media print {
            #quick-nav, .credit-header { display: none; }
            .book-container { width: 100%; }
        }
    </style>
</head>
<body>

<div id="quick-nav" title="월 선택">
    <div id="nav-items"></div>
</div>

<div class="credit-header">
    <div class="credit-title">HAJUN'S MEMORY BOOK</div>
    <div class="credit-badge">
        Created by <b>두인호</b> x <b style="color:#4285F4">제미나이</b> | <span id="last-updated"></span>
    </div>
</div>

<div id="album-content" class="book-container"></div>

<script src="./reports.js"></script>
<script src="./albums.js"></script>

<script>
    const lastMod = new Date(document.lastModified);
    document.getElementById('last-updated').innerText = `v02 (${lastMod.getFullYear()}.${String(lastMod.getMonth() + 1).padStart(2, '0')}.${String(lastMod.getDate()).padStart(2, '0')})`;

    const weatherMap = { 'sunny': '☀️', 'mostly_cloudy': '⛅', 'partly_cloudy': '🌤️', 'overcast': '☁️', 'rain': '🌧️', 'snow': '❄️', 'mixed_rain_snow': '🌨️', 'fog': '🌫️', 'yellow_sand': '😷', 'sunny_after_rain': '🌦️' };
    const weekDays = ['일', '월', '화', '수', '목', '금', '토'];

    function getLocalDateStr(dateString) {
        if (!dateString) return '1970-01-01';
        const d = new Date(dateString);
        return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
    }

    function createImageGridHtml(imagesArray, folderName) {
        if (!imagesArray || imagesArray.length === 0) return '';
        let html = `<div class="photo-gallery">`;
        imagesArray.forEach(imgPath => {
            const fileName = imgPath.split(/\\|\//).pop();
            html += `<img src="./${folderName}/${fileName}" alt="사진" loading="lazy" 
                     onload="if(this.naturalWidth > this.naturalHeight * 1.35){this.classList.add('wide-pic');}" 
                     onerror="this.style.display='none'">`;
        });
        html += `</div>`;
        return html;
    }

    function renderAlbum() {
        const container = document.getElementById('album-content');
        const navItems = document.getElementById('nav-items');
        const combinedData = {};

        if (typeof reportsData !== 'undefined') {
            reportsData.forEach(r => {
                const dateStr = getLocalDateStr(r.date_written);
                if (!combinedData[dateStr]) combinedData[dateStr] = { dateObj: new Date(dateStr), reports: [], albums: [], weather: r.weather };
                combinedData[dateStr].reports.push(r);
            });
        }
        if (typeof albumsData !== 'undefined') {
            albumsData.forEach(a => {
                const dateStr = getLocalDateStr(a.date_written);
                if (!combinedData[dateStr]) combinedData[dateStr] = { dateObj: new Date(dateStr), reports: [], albums: [], weather: 'sunny' };
                combinedData[dateStr].albums.push(a);
            });
        }

        const sortedDates = Object.keys(combinedData).sort((a, b) => new Date(a) - new Date(b));
        let currentMonth = '';
        let currentYear = '';

        sortedDates.forEach(dateStr => {
            const dayData = combinedData[dateStr];
            const dateObj = dayData.dateObj;
            const year = dateObj.getFullYear();
            const month = dateObj.getMonth() + 1;
            const yearMonthText = `${year}년 ${month}월`;
            const monthId = `m-${year}-${month}`;

            if (currentMonth !== yearMonthText) {
                currentMonth = yearMonthText;
                if (currentYear !== year) {
                    currentYear = year;
                    const yLbl = document.createElement('div'); yLbl.className = 'nav-year'; yLbl.textContent = year;
                    navItems.appendChild(yLbl);
                    const grid = document.createElement('div'); grid.className = 'nav-month-grid'; grid.id = `g-${year}`;
                    navItems.appendChild(grid);
                }
                const nMon = document.createElement('div'); nMon.className = 'nav-month'; nMon.textContent = month;
                nMon.onclick = (e) => { 
                    e.stopPropagation();
                    document.getElementById(monthId).scrollIntoView();
                };
                document.getElementById(`g-${year}`).appendChild(nMon);

                const mHdr = document.createElement('div'); mHdr.className = 'month-header'; mHdr.id = monthId;
                mHdr.textContent = yearMonthText; container.appendChild(mHdr);
            }

            const entryDiv = document.createElement('div');
            entryDiv.className = 'entry';
            let rightHtml = '';

            dayData.reports.forEach(report => {
                rightHtml += `<div class="entry-header"><div class="entry-title">원에서 가정으로</div><div class="entry-author">${report.author_name}</div></div>${createImageGridHtml(report.local_images, 'images')}<div class="entry-content">${report.content}</div>`;
            });

            dayData.albums.forEach(album => {
                if (album.local_images && album.local_images.length > 0) {
                    rightHtml += `<div class="album-section"><div class="album-title">📸 추가 앨범 : ${album.title}</div>${createImageGridHtml(album.local_images, 'album_images')}</div>`;
                }
            });

            if (rightHtml.trim() === '') return;

            entryDiv.innerHTML = `
                <div class="entry-left">
                    <div class="date-num">${dateObj.getDate()}</div>
                    <div class="date-day">${weekDays[dateObj.getDay()]}요일</div>
                    <div class="weather-icon">${weatherMap[dayData.weather] || '☀️'}</div>
                </div>
                <div class="entry-right">${rightHtml}</div>
            `;
            container.appendChild(entryDiv);
        });
    }

    renderAlbum();
</script>
</body>
</html>
